<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <div id="print">
      <h1>Nnumbers from 1 to 10</h1>
    </div>
    <script>
      let i;
      for (i = 1; i <= 10; i++) {
        document.writeln(i + "<br>");
      }
    </script>
  </body>
</html>
