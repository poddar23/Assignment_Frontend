<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Navigation & Pseudo-Classes Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    /* Navigation Menu */
    nav {
      background-color: #f0f0f0;
      padding: 10px;
      border-radius: 6px;
    }

    nav a {
      text-decoration: none;
      color: #333;
      margin-right: 15px;
      padding: 6px 10px;
      border-radius: 4px;
      transition: background-color 0.3s;
    }

    /* Change link color and background on hover */
    nav a:hover {
      background-color: #4caf50;
      color: white;
    }

    /* Style form inputs */
    form {
      margin-top: 30px;
      max-width: 300px;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 2px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }

    /* Highlight input when focused */
    input[type="text"]:focus,
    input[type="email"]:focus {
      border-color: #4caf50;
      background-color: #f1f8e9;
      outline: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      background-color: #4caf50;
      color: white;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #388e3c;
    }
  </style>
</head>
<body>

  <h1>Navigation and Pseudo-Class Styling</h1>

  <!-- Navigation Menu -->
  <nav>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- Form -->
  <form>
    <h2>Contact Us</h2>
    <label for="name">Your Name:</label><br />
    <input type="text" id="name" name="name" placeholder="Enter your name" /><br />

    <label for="email">Your Email:</label><br />
    <input type="email" id="email" name="email" placeholder="Enter your email" /><br />

    <button type="submit">Submit</button>
  </form>

</body>
</html>
