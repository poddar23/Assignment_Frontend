<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Types Demo</title>

  <!-- Internal CSS -->
  <style>
    .internal-style {
      background-color: #e0f7fa;
      color: #006064;
      padding: 12px;
      border: 2px dashed #006064;
    }
  </style>

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <h1 style="color: darkgreen; text-align: center;">This uses Inline CSS</h1>

  <div class="internal-style">
    This box is styled using <strong>Internal CSS</strong> (defined in a &lt;style&gt; block).
  </div>

  <p class="external-style">
    This paragraph is styled using <strong>External CSS</strong> (linked via a separate stylesheet).
  </p>

</body>
</html>
