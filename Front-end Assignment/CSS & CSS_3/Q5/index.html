<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Product Grid</title>
</head>
<body>

  <div class="product-grid">
    
    <div class="card">
      <img src="https://gourban.in/cdn/shop/files/Beige.png?v=1749553994&width=600" alt="Product 1">
      <h3>Smart Watch</h3>
      <p class="price">$89.99</p>
    </div>

    <div class="card">
      <img src="https://www.beatsbydre.com/content/dam/beats/web/product/earbuds/solo-buds/pdp/product-carousel/matte-black/black-01-solobuds.jpg.large.2x.jpg" alt="Product 2">
      <h3>Wireless Earbuds</h3>
      <p class="price">$49.99</p>
    </div>

    <div class="card">
      <img src="https://www.fgear.in/cdn/shop/files/1_06a8d208-f39b-464a-b31b-1ffb172fc1d5.png?v=1759921010&width=823" alt="Product 3">
      <h3>Backpack</h3>
      <p class="price">$39.99</p>
    </div>

    <div class="card">
      <img src="https://image.the-woggles.com/cache/catalog/custom_filter/formal_150x150.png" alt="Product 4">
      <h3>Sunglasses</h3>
      <p class="price">$24.99</p>
    </div>

    <div class="card">
      <img src="https://static.nike.com/a/images/t_web_pdp_535_v2/f_auto/6b88cd96-20c5-43c1-8645-38d1aaac0946/PEGASUS+EASYON.png" alt="Product 5">
      <h3>Running Shoes</h3>
      <p class="price">$74.99</p>
    </div>

    <div class="card">
      <img src="https://avstore.in/cdn/shop/files/1.AVStore-JBL-PartyBox-110-160W-Portable-Wireless-Speaker-Front-View-Hero.jpg?v=1682411624&width=600" alt="Product 6">
      <h3>Bluetooth Speaker</h3>
      <p class="price">$59.99</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Product 7">
      <h3>Desk Lamp</h3>
      <p class="price">$29.99</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Product 8">
      <h3>Coffee Mug</h3>
      <p class="price">$12.99</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Product 9">
      <h3>Notebook</h3>
      <p class="price">$8.99</p>
    </div>

  </div>

</body>
</html>
