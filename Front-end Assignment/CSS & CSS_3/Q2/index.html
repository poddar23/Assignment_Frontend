<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="contact-form">
  <label for="name">Full Name:</label>
  <input type="text" id="name" class="form-field" placeholder="Enter your name">

  <label for="email">Email:</label>
  <input type="email" id="email" class="form-field" placeholder="Enter your email">

  <label for="message">Message:</label>
  <textarea id="message" class="form-field" placeholder="Write your message"></textarea>

  <button type="submit" id="submit-btn">Send Message</button>
</form>

</body>
</html>
